name: Product verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: velostra-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web lint and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      - run: npm run build

  server:
    name: API security and unit gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
      - run: npm run db:check
      - run: npm run test:config
      - run: npm run test:auth
      - run: npm run test:ssrf
      - run: npm run test:http-security
      - run: npm run test:secrets
      - run: npm run test:admin-policy
      - run: npm run test:money-unit

  contract:
    name: Contract local-EVM suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
      - run: npm test

  money-loop:
    name: Money loop and reconciliation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: velostra
          POSTGRES_DB: velostra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d velostra_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:velostra@127.0.0.1:5432/velostra_test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            contracts/package-lock.json
      - run: npm ci --prefix server
      - run: npm ci --prefix contracts
      - run: npm --prefix server run db:migrate
      - run: npm --prefix server run test:migrations
      - run: npm --prefix server run test:money
      - name: Dump migrated source database
        run: >-
          docker run --rm --network host -e PGPASSWORD=velostra
          -v "${{ runner.temp }}:/backup" postgres:16
          pg_dump -h 127.0.0.1 -U postgres -d velostra_test
          --format=custom --file=/backup/velostra.dump
      - name: Restore into a clean database
        run: |
          docker run --rm --network host -e PGPASSWORD=velostra postgres:16 createdb -h 127.0.0.1 -U postgres velostra_restore
          docker run --rm --network host -e PGPASSWORD=velostra -v "${{ runner.temp }}:/backup" postgres:16 pg_restore -h 127.0.0.1 -U postgres -d velostra_restore --no-owner --no-privileges /backup/velostra.dump
      - name: Verify restored data and invariants
        env:
          SOURCE_DATABASE_URL: postgresql://postgres:velostra@127.0.0.1:5432/velostra_test
          RESTORED_DATABASE_URL: postgresql://postgres:velostra@127.0.0.1:5432/velostra_restore
        run: npm --prefix server run restore:verify
