name: Product verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: velostra-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web lint and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run audit:metamask
      - run: npm run test:phase2-evidence
      - run: npm run lint
      - run: npm run build

  browser:
    name: Browser accessibility, wallet, visual, and performance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-evidence
          path: |
            artifacts/playwright-report
            artifacts/playwright-results
            artifacts/performance
          if-no-files-found: ignore

  server:
    name: API security and unit gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
      - run: npm run db:check
      - run: npm run test:config
      - run: npm run test:auth
      - run: npm run test:ssrf
      - run: npm run test:http-security
      - run: npm run test:secrets
      - run: npm run test:signer
      - run: npm run test:authority
      - run: npm run test:observability
      - run: npm run test:resilience
      - run: npm run authority:validate -- ../deploy/staging/authority-policy.example.json
      - run: npm run test:admin-policy
      - run: npm run test:money-unit

  contract:
    name: Contract local-EVM suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
      - run: npm test

  money-loop:
    name: Money loop and reconciliation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: velostra
          POSTGRES_DB: velostra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d velostra_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6399:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:velostra@127.0.0.1:5432/velostra_test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            contracts/package-lock.json
      - run: npm ci --prefix server
      - run: npm ci --prefix contracts
      - run: npm --prefix server run db:migrate
      - run: npm --prefix server run test:migrations
      - run: npm --prefix server run test:observability-db
      - run: npm --prefix server run test:money
      - name: Start restore drill timer
        run: echo "RESTORE_DRILL_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
      - name: Dump migrated source database
        run: >-
          docker run --rm --network host -e PGPASSWORD=velostra
          -v "${{ runner.temp }}:/backup" postgres:16
          pg_dump -h 127.0.0.1 -U postgres -d velostra_test
          --format=custom --file=/backup/velostra.dump
      - name: Restore into a clean database
        run: |
          docker run --rm --network host -e PGPASSWORD=velostra postgres:16 createdb -h 127.0.0.1 -U postgres velostra_restore
          docker run --rm --network host -e PGPASSWORD=velostra -v "${{ runner.temp }}:/backup" postgres:16 pg_restore -h 127.0.0.1 -U postgres -d velostra_restore --no-owner --no-privileges /backup/velostra.dump
      - name: Verify restored data and invariants
        env:
          SOURCE_DATABASE_URL: postgresql://postgres:velostra@127.0.0.1:5432/velostra_test
          RESTORED_DATABASE_URL: postgresql://postgres:velostra@127.0.0.1:5432/velostra_restore
          RESTORE_EVIDENCE_PATH: ${{ runner.temp }}/restore-evidence.json
        run: npm --prefix server run restore:verify
      - name: Upload restore evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-evidence
          path: ${{ runner.temp }}/restore-evidence.json
          if-no-files-found: ignore
