<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Velostra master brand mark</title>
  <desc id="desc">Editable master artwork for the faceted Velostra V monogram.</desc>
  <defs>
    <linearGradient id="velostra-gradient" x1="14" y1="8" x2="49" y2="57" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F7EE"/>
      <stop offset="0.42" stop-color="#DCEBAA"/>
      <stop offset="1" stop-color="#9EDB42"/>
    </linearGradient>
    <filter id="node-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.35" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g id="velostra-mark">
    <g id="facet-shell">
      <path d="M7 10.5 31.6 3l25.5 7.5L49 35.8 32 61 14.9 35.8 7 10.5Z" fill="#C9FF5F" fill-opacity="0.035" stroke="#EBF1E5" stroke-opacity="0.18"/>
    </g>
    <g id="v-monogram">
      <path d="M12.6 11.8h13.2L32 31.1l6.2-19.3h13.2L38.1 53.2H25.9L12.6 11.8Z" fill="url(#velostra-gradient)"/>
    </g>
    <g id="center-cut">
      <path d="m25.8 11.8 6.2 19.3 6.2-19.3L32 7.1l-6.2 4.7Z" fill="#070A0E"/>
    </g>
    <g id="edge-highlight">
      <path d="M14.8 13.4 27.5 51h9L49.2 13.4" stroke="#FFFFFF" stroke-opacity="0.42" stroke-width="0.7" stroke-linecap="round"/>
    </g>
    <g id="settlement-node">
      <rect x="29.35" y="28.45" width="5.3" height="5.3" rx="1" transform="rotate(45 32 31.1)" fill="#C9FF5F" filter="url(#node-glow)"/>
    </g>
  </g>

  <g id="safe-area-guides" display="none">
    <rect x="1" y="1" width="62" height="62" rx="15" stroke="#FF4FD8" stroke-width="0.35" stroke-dasharray="1 1"/>
    <circle cx="32" cy="32" r="29" stroke="#59D8FF" stroke-width="0.35" stroke-dasharray="1 1"/>
    <path d="M32 0v64M0 32h64" stroke="#59D8FF" stroke-width="0.25" stroke-dasharray="1 1"/>
  </g>
</svg>
