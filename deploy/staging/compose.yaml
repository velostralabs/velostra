name: velostra-staging

x-server-common: &server-common
  image: ${VELOSTRA_SERVER_IMAGE:?set VELOSTRA_SERVER_IMAGE to an immutable image reference}
  restart: unless-stopped
  init: true
  networks:
    - backend
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:size=32m,mode=1777
  volumes:
    - ${PHASE3_ARTIFACTS_DIR:-../../artifacts/phase3/input}:/run/velostra/phase3-input:ro
    - ${PHASE3_EVIDENCE_DIR:-../../artifacts/phase3/evidence}:/run/velostra/phase3-evidence
  deploy:
    resources:
      limits:
        cpus: "1.00"
        memory: 768M
      reservations:
        cpus: "0.25"
        memory: 256M

services:
  web:
    image: ${VELOSTRA_WEB_IMAGE:?set VELOSTRA_WEB_IMAGE to an immutable image reference}
    restart: unless-stopped
    init: true
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-8080}:8080"
    networks:
      - edge
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=16m,mode=0755
      - /var/run:size=1m,mode=0755
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  migration:
    <<: *server-common
    env_file:
      - path: ./common.env
        required: true
    profiles: ["release"]
    restart: "no"
    command: ["node", "dist/scripts/migrate.js"]
    environment:
      VELOSTRA_PROCESS_ROLE: migration
    healthcheck:
      disable: true

  api:
    <<: *server-common
    env_file:
      - path: ./common.env
        required: true
      - path: ./api.env
        required: true
    command: ["node", "dist/index.js"]
    environment:
      VELOSTRA_PROCESS_ROLE: api
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8787}:8787"
    networks:
      - edge
      - backend
    stop_grace_period: 30s

  reconciliation-worker:
    <<: *server-common
    env_file:
      - path: ./common.env
        required: true
      - path: ./worker.env
        required: true
    command: ["node", "dist/jobs/reconcile.js", "--watch"]
    environment:
      VELOSTRA_PROCESS_ROLE: reconciliation-worker
    healthcheck:
      disable: true
    stop_grace_period: 60s

  webhook-worker:
    <<: *server-common
    env_file:
      - path: ./common.env
        required: true
      - path: ./webhook.env
        required: true
    command: ["node", "dist/jobs/webhooks.js", "--watch"]
    environment:
      VELOSTRA_PROCESS_ROLE: webhook-worker
    healthcheck:
      disable: true
    stop_grace_period: 30s

  operational-monitor:
    <<: *server-common
    env_file:
      - path: ./common.env
        required: true
      - path: ./monitor.env
        required: true
    command: ["node", "dist/jobs/monitor.js", "--watch"]
    environment:
      VELOSTRA_PROCESS_ROLE: operational-monitor
    healthcheck:
      disable: true
    stop_grace_period: 30s

networks:
  edge:
    internal: false
  backend:
    internal: true
